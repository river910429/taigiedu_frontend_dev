name: Deploy to Production

on:
  # 只允許手動按按鈕，避免意外觸發
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main   # ← 從 main 分支取程式碼

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Build (Production)
        run: |
          npm install
          # 產生正式環境的 .env
          echo "VITE_BASE_PATH=/" > .env
          echo "VITE_API_URL=https://www.taigiedu.com/backend" >> .env
          echo "VITE_IMAGE_URL=https://dev.taigiedu.com" >> .env
          echo "VITE_ENABLE_UNSTABLE_FEATURES=false" >> .env
          echo "VITE_ENABLE_ROBOTS_NOINDEX=false" >> .env
          npm run build

      - name: Sync to Server
        run: |
          rsync -av --delete ${{ github.workspace }}/dist/ /var/www/taigiedu_frontend/
